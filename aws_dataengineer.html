<script>
    const questions = [
        {
            domain: "Data Ingestion & Transformation",
            type: "single",
            question: "A company needs to ingest streaming data from thousands of IoT devices. The data must be transformed in near real-time using SQL and then loaded into an Amazon S3 data lake. Which architecture is the MOST cost-effective and operationally efficient?",
            options: [
                "A. Use Kinesis Data Streams to collect data, then use an AWS Lambda function to transform data and write to S3.",
                "B. Use Kinesis Data Streams to collect data, then use Kinesis Data Analytics to transform the data, and Kinesis Data Firehose to deliver it to S3.",
                "C. Use Amazon MSK to ingest the stream, and a Spark Streaming application on EMR to process and write to S3.",
                "D. Use AWS AppFlow to ingest the device data directly into an S3 bucket and trigger a Glue Crawler."
            ],
            correctAnswers: [1],
            explanations: {
                0: "Incorrect. While Lambda works, it requires managing custom code and execution scaling for thousands of devices, which is less operationally efficient than a managed SQL analytics service.",
                1: "Correct. Kinesis Data Analytics allows for near real-time SQL transformation on streaming data. Paired with Firehose, it provides a fully managed, serverless pipeline from ingestion to S3 storage.",
                2: "Incorrect. Amazon MSK and EMR are powerful but involve significant management overhead and higher costs for this specific use case compared to Kinesis serverless options.",
                3: "Incorrect. AWS AppFlow is designed for SaaS application integration (e.g., Salesforce, Zendesk), not for high-velocity IoT telemetry streaming."
            }
        },
        {
            domain: "Data Storage & Management",
            type: "multiple",
            question: "A data engineer is designing a schema for Amazon Redshift to improve query performance for a large sales table frequently joined with a date dimension table. Which TWO actions would best optimize this? (Choose TWO)",
            options: [
                "A. Set the distribution style of the date dimension table to ALL.",
                "B. Set the distribution style of both tables to EVEN.",
                "C. Set the distribution style of the large sales table to KEY based on the date column.",
                "D. Set the distribution style of the date dimension table to AUTO and the sales table to ALL.",
                "E. Use a SORT KEY on the date column for both tables."
            ],
            correctAnswers: [0, 2],
            explanations: {
                0: "Correct. Distributing a small dimension table to ALL nodes ensures a local copy is available on every compute node, eliminating network traffic during joins with larger tables.",
                1: "Incorrect. EVEN distribution is a fallback for when no clear join key exists; it does not optimize for joins and causes heavy data shuffling.",
                2: "Correct. Using KEY distribution on the join column for the large table ensures related data is co-located on the same nodes as the dimension data (which is on all nodes).",
                3: "Incorrect. You cannot set a large fact table to ALL distribution as it would consume too much storage on every node and degrade performance.",
                4: "Incorrect. While Sort Keys help with filtering and range scans, they do not manage how data is partitioned across nodes, which is the primary concern for join performance."
            }
        },
        {
            domain: "Data Security & Governance",
            type: "single",
            question: "A company uses AWS Lake Formation to manage its S3 data lake. A data analyst needs access to specific columns in a Glue Data Catalog table but should not see PII columns. How should the data engineer implement this?",
            options: [
                "A. Create an IAM policy that denies s3:GetObject on the S3 prefixes corresponding to the PII columns.",
                "B. Use Lake Formation data filters to grant 'Select' permissions on specific columns to the analyst's IAM role.",
                "C. Create a separate S3 bucket for the analyst and use a Glue job to copy only the allowed columns.",
                "D. Use Amazon Redshift Spectrum and create a VIEW that excludes the PII columns."
            ],
            correctAnswers: [1],
            explanations: {
                0: "Incorrect. S3 is object-level storage. You cannot deny access to specific columns within a file (like Parquet or CSV) using IAM S3 policies.",
                1: "Correct. Lake Formation provides fine-grained access control, allowing administrators to grant column-level, row-level, and cell-level permissions without duplicating data.",
                2: "Incorrect. This creates data silos and increases management overhead. Lake Formation is designed to avoid this manual 'copy and mask' approach.",
                3: "Incorrect. While a View works, it forces the use of Redshift. Lake Formation provides a centralized way to manage this across multiple services like Athena and EMR."
            }
        },
        {
            domain: "Data Operations & Orchestration",
            type: "single",
            question: "An AWS Glue job is consistently failing with 'java.lang.OutOfMemoryError: Java heap space'. The job processes large shuffle operations. Which action is the MOST effective to resolve this?",
            options: [
                "A. Increase the number of 'Max capacity' (DPUs) for the job.",
                "B. Change the Worker Type from G.1X to G.2X.",
                "C. Enable Job Bookmarks to process only new data.",
                "D. Decrease the Glue 'Timeout' setting to fail faster and retry."
            ],
            correctAnswers: [1],
            explanations: {
                0: "Incorrect. Increasing the number of DPUs (scaling out) adds more workers, but if a single partition is too large for a worker's heap, adding more workers won't fix the memory issue on that specific worker.",
                1: "Correct. G.2X workers provide twice the memory and disk space of G.1X workers. This scales up the individual worker to handle memory-intensive shuffles or large joins.",
                2: "Incorrect. Job Bookmarks help with incremental loading but do not solve memory issues during the execution phase of a single batch.",
                3: "Incorrect. Decreasing the timeout will cause the job to fail sooner, but it does nothing to address the underlying memory exhaustion."
            }
        },
        {
            domain: "Data Ingestion & Transformation",
            type: "single",
            question: "A data engineer needs to move 50 TB of historical data from an on-premises Hadoop cluster to Amazon S3. The company has a 100 Mbps internet connection. What is the BEST method for this migration?",
            options: [
                "A. Use AWS DataSync over the existing internet connection.",
                "B. Use the AWS CLI 's3 cp' command with multi-part upload enabled.",
                "C. Order an AWS Snowball Edge Storage Optimized device to migrate the data.",
                "D. Set up an AWS Direct Connect 1Gbps connection and use S3 Transfer Acceleration."
            ],
            correctAnswers: [2],
            explanations: {
                0: "Incorrect. 50 TB over a 100 Mbps connection would take over 45 days, assuming 100% utilization and no overhead. This is too slow and unreliable.",
                1: "Incorrect. Similar to DataSync, the bandwidth is the bottleneck for the CLI. It is not feasible for 50 TB at these speeds.",
                2: "Correct. For dozens of terabytes where bandwidth is limited, AWS Snowball is the fastest and most cost-effective way to physically move data to the cloud.",
                3: "Incorrect. Setting up Direct Connect takes weeks or months of lead time and is expensive for a one-time migration of 50 TB."
            }
        },
        {
            domain: "Data Ingestion & Transformation",
            type: "single",
            question: "A company receives data in XML format into an S3 bucket. They want to use AWS Glue to convert this data to Parquet and catalog it. The Glue crawler identifies the XML schema but the Glue job fails to parse nested tags correctly. What is the BEST approach to handle this?",
            options: [
                "A. Use a Glue DynamicFrame with the 'relationalize' transform.",
                "B. Use an AWS Lambda function to convert XML to JSON before the Glue job runs.",
                "C. Write a custom PySpark script using the 'com.databricks.spark.xml' library within the Glue job.",
                "D. Manually update the Glue Data Catalog schema to flatten the nested XML."
            ],
            correctAnswers: [2],
            explanations: {
                0: "Incorrect. Relationalize is used to flatten nested JSON-like structures into a relational format, but it doesn't solve primary parsing issues for complex XML schemas.",
                1: "Incorrect. This adds extra infrastructure and cost. Glue is capable of processing files directly if configured correctly.",
                2: "Correct. AWS Glue supports external Spark libraries. The Databricks XML library is the standard for handling complex, nested XML in Spark/Glue environments.",
                3: "Incorrect. Changing the catalog schema won't change how the underlying job reads the raw XML data; the parser will still fail."
            }
        },
        {
            domain: "Data Operations & Orchestration",
            type: "single",
            question: "A data pipeline uses AWS Step Functions to coordinate Glue jobs and Lambda functions. One Glue job often takes longer than expected, causing the entire state machine to time out. How should the data engineer fix this?",
            options: [
                "A. Increase the 'TimeoutSeconds' in the Step Functions State configuration for that specific Task.",
                "B. Use a 'Wait' state before calling the Glue job to give it more buffer time.",
                "C. Configure the Glue job to use more DPUs to ensure it always finishes under 10 minutes.",
                "D. Implement a 'Parallel' state to run the Glue job and a timer simultaneously."
            ],
            correctAnswers: [0],
            explanations: {
                0: "Correct. Task states in Step Functions have a default timeout. Increasing 'TimeoutSeconds' allows the specific Glue task to run longer without failing the state machine.",
                1: "Incorrect. A 'Wait' state happens before the job starts; it doesn't help if the job itself is taking a long time to execute.",
                2: "Incorrect. While more DPUs might speed it up, it doesn't guarantee the job won't occasionally run longer due to data volume spikes. The state machine needs to be resilient to varied runtimes.",
                3: "Incorrect. This is overly complex and doesn't solve the core issue of the Glue task itself timing out within the orchestration layer."
            }
        },
        {
            domain: "Data Storage & Management",
            type: "single",
            question: "Data in an Amazon S3 bucket must be automatically transitioned to a cheaper storage class after 30 days and deleted after 365 days. Which S3 feature should be used?",
            options: [
                "A. S3 Replication rules.",
                "B. S3 Bucket Policies.",
                "C. S3 Lifecycle policies.",
                "D. S3 Intelligent-Tiering."
            ],
            correctAnswers: [2],
            explanations: {
                0: "Incorrect. Replication is used for copying data between buckets or regions for DR/compliance, not for lifecycle management.",
                1: "Incorrect. Bucket policies are for access control (security), not for managing the lifecycle of objects.",
                2: "Correct. S3 Lifecycle policies allow you to define transitions (e.g., to S3 Standard-IA or Glacier) and expiration (deletion) based on the age of the objects.",
                3: "Incorrect. Intelligent-Tiering automatically moves data between tiers based on access patterns, but it does not handle scheduled deletion (expiration)."
            }
        },
        {
            domain: "Data Ingestion & Transformation",
            type: "multiple",
            question: "A data engineer is using Amazon Kinesis Data Firehose to deliver logs to S3. They want to minimize the number of small files being created in S3 to improve Athena query performance. Which TWO configurations should be adjusted? (Choose TWO)",
            options: [
                "A. Increase the Buffer size.",
                "B. Decrease the Buffer interval.",
                "C. Increase the Buffer interval.",
                "D. Enable GZIP compression.",
                "E. Use a Lambda transformation to merge records."
            ],
            correctAnswers: [0, 2],
            explanations: {
                0: "Correct. Increasing the buffer size forces Firehose to collect more data before writing an object to S3, resulting in larger, fewer files.",
                1: "Incorrect. Decreasing the interval would cause Firehose to write files more frequently, increasing the number of small files.",
                2: "Correct. Increasing the buffer interval (up to 900 seconds) allows more time for data to accumulate before a write operation occurs.",
                3: "Incorrect. While compression is good practice, it actually makes files smaller, which doesn't solve the 'many small files' problem (though it helps with Athena costs).",
                4: "Incorrect. Merging records inside a Lambda doesn't change when Firehose flushes the buffer to S3; the buffering configuration handles the file size."
            }
        },
        {
            domain: "Data Storage & Management",
            type: "single",
            question: "A company needs to share a subset of a Redshift database with a third-party analytics provider who also has an AWS account in a different region. What is the MOST efficient way to provide this access without moving data?",
            options: [
                "A. Use Redshift Data Sharing.",
                "B. Take a snapshot of the cluster and share it with the third party's AWS account.",
                "C. Use UNLOAD to export data to S3 and give the third party S3 access.",
                "D. Create a Cross-Region VPC Peering connection and allow the third party to connect to the Redshift leader node."
            ],
            correctAnswers: [0],
            explanations: {
                0: "Correct. Redshift Data Sharing allows for secure, easy sharing of live data across clusters, accounts, and regions without the need to copy or move data.",
                1: "Incorrect. Sharing a snapshot requires the third party to restore it to their own cluster, which involves moving data and incurring storage costs.",
                2: "Incorrect. UNLOAD involves data movement and manual updates if the data changes; it is not 'efficient' for sharing live data.",
                3: "Incorrect. This is highly insecure and operationally complex. Direct access to the leader node for a third party is not a recommended architectural pattern."
            }
        },
        {
            domain: "Data Security & Governance",
            type: "single",
            question: "A data engineer must ensure that all data stored in Amazon S3 is encrypted at rest using keys managed by the company's security team. The security team wants to audit the use of these keys. Which encryption method should be used?",
            options: [
                "A. SSE-S3 (Server-Side Encryption with Amazon S3-Managed Keys).",
                "B. SSE-KMS (Server-Side Encryption with AWS KMS Keys).",
                "C. SSE-C (Server-Side Encryption with Customer-Provided Keys).",
                "D. Client-Side Encryption with manual key management."
            ],
            correctAnswers: [1],
            explanations: {
                0: "Incorrect. SSE-S3 uses keys managed by AWS, and users don't have control or audit visibility into the individual keys used for specific objects.",
                1: "Correct. SSE-KMS allows the company to use their own Customer Master Keys (CMKs), provides an audit trail through CloudTrail, and allows the security team to manage permissions.",
                2: "Incorrect. SSE-C requires the company to manage and send the key with every request, which is operationally heavy and doesn't leverage AWS's audit features as easily.",
                3: "Incorrect. Client-Side encryption is possible but requires more complex application-side changes compared to the seamless server-side KMS integration."
            }
        },
        {
            domain: "Data Ingestion & Transformation",
            type: "single",
            question: "A data engineer wants to use Amazon Athena to query data stored in an RDS PostgreSQL database without migrating the data to S3. Which Athena feature allows this?",
            options: [
                "A. Athena Federated Query.",
                "B. Athena Workgroups.",
                "C. Athena Data Catalog.",
                "D. Athena CTAS (Create Table As Select)."
            ],
            correctAnswers: [0],
            explanations: {
                0: "Correct. Athena Federated Query uses Lambda connectors to run SQL queries across data stored in relational, non-relational, object, and custom data sources.",
                1: "Incorrect. Workgroups are used to isolate users, teams, or applications and to set query limits and track costs.",
                2: "Incorrect. The Data Catalog stores metadata about S3 data; it doesn't provide the execution engine to reach into RDS directly without a connector.",
                3: "Incorrect. CTAS is used to create new tables in S3 from existing Athena query results, which involves moving/creating data."
            }
        },
        {
            domain: "Data Operations & Orchestration",
            type: "single",
            question: "A company needs a serverless way to orchestrate a complex data workflow including Glue, Lambda, and Athena. The workflow requires branching logic based on the results of a previous step. Which service is BEST suited for this?",
            options: [
                "A. AWS Glue Workflows.",
                "B. Amazon Managed Workflows for Apache Airflow (MWAA).",
                "C. AWS Step Functions.",
                "D. Amazon EventBridge."
            ],
            correctAnswers: [2],
            explanations: {
                0: "Incorrect. Glue Workflows are mostly limited to Glue-related tasks and lack the sophisticated branching and error handling found in Step Functions.",
                1: "Incorrect. While MWAA can do this, it is not as 'serverless' in terms of startup time and cost for simple branching logic compared to Step Functions.",
                2: "Correct. Step Functions is the standard serverless orchestrator that supports complex branching, retries, and integration with many AWS services.",
                3: "Incorrect. EventBridge is an event bus for decoupling services, not a workflow orchestrator for managing state and branching logic."
            }
        },
        {
            domain: "Data Storage & Management",
            type: "single",
            question: "An Amazon Redshift cluster is running out of storage space. The workload consists of mostly complex read-heavy analytical queries. What is the MOST cost-effective way to scale storage while maintaining performance?",
            options: [
                "A. Resize the cluster by adding more nodes.",
                "B. Switch to RA3 node types with Managed Storage.",
                "C. Enable Concurrency Scaling.",
                "D. Use the UNLOAD command to move old data to S3 and query it via Redshift Spectrum."
            ],
            correctAnswers: [1],
            explanations: {
                0: "Incorrect. Adding nodes increases both compute and storage costs, which might lead to over-provisioning compute if only storage is needed.",
                1: "Correct. RA3 nodes allow you to scale and pay for compute and storage independently. Managed Storage automatically handles storage scaling using S3 as a backing layer.",
                2: "Incorrect. Concurrency Scaling adds transient compute capacity to handle bursts in query volume; it does not increase permanent storage capacity.",
                3: "Incorrect. While this saves space, Spectrum is slower for complex queries than local Redshift storage. RA3 is generally preferred for a 'hot' data performance requirement."
            }
        },
        {
            domain: "Data Ingestion & Transformation",
            type: "single",
            question: "A data engineer needs to ingest log data from multiple sources and ensure it is delivered to S3 in Parquet format. Which AWS service can perform this transformation natively during ingestion?",
            options: [
                "A. Amazon Kinesis Data Streams.",
                "B. Amazon Kinesis Data Firehose.",
                "C. AWS Glue DataBrew.",
                "D. Amazon MSK."
            ],
            correctAnswers: [1],
            explanations: {
                0: "Incorrect. Kinesis Data Streams is just a transport layer; it doesn't transform data into Parquet natively.",
                1: "Correct. Kinesis Data Firehose has a built-in feature to convert input JSON data to Parquet or ORC using a schema defined in the Glue Data Catalog.",
                2: "Incorrect. DataBrew is a visual data preparation tool, usually used for cleaning data already in S3, not for real-time ingestion transformation.",
                3: "Incorrect. MSK (Kafka) requires external consumers (like Spark or Flink) to perform transformations and write Parquet files."
            }
        },
        {
            domain: "Data Ingestion & Transformation",
            type: "single",
            question: "A company wants to capture changes from an RDS for MySQL database and update an S3 data lake in near real-time. Which combination of services should be used?",
            options: [
                "A. AWS Glue Crawler and Glue ETL Job.",
                "B. AWS Data Migration Service (DMS) and Amazon S3.",
                "C. Amazon AppFlow and Amazon S3.",
                "D. RDS Snapshot and AWS Glue."
            ],
            correctAnswers: [1],
            explanations: {
                0: "Incorrect. Glue Crawlers detect schema; they don't capture real-time CDC (Change Data Capture) from a database.",
                1: "Correct. AWS DMS with Change Data Capture (CDC) enabled is the standard way to stream updates from a relational database to S3 in near real-time.",
                2: "Incorrect. AppFlow is for SaaS apps (Salesforce, etc.), not for CDC from an RDS database.",
                3: "Incorrect. Snapshots are point-in-time backups and are not suitable for near real-time updates."
            }
        },
        {
            domain: "Data Storage & Management",
            type: "single",
            question: "A data engineer is query data in S3 using Amazon Athena. The queries are becoming slow and expensive because Athena scans the entire dataset for every query. What is the FIRST optimization to implement?",
            options: [
                "A. Use Athena Workgroups to limit data usage.",
                "B. Convert the data to a columnar format like Parquet and implement partitioning.",
                "C. Increase the Athena query concurrency limit.",
                "D. Use Redshift Spectrum instead of Athena."
            ],
            correctAnswers: [1],
            explanations: {
                0: "Incorrect. Workgroups control costs by failing queries that exceed limits, but they don't actually make the queries faster or more efficient.",
                1: "Correct. Columnar formats (Parquet) allow Athena to read only relevant columns, and partitioning allows it to skip irrelevant files based on the folder structure (e.g., /year=2023/).",
                2: "Incorrect. Increasing concurrency allows more queries to run at once, but it doesn't solve the inefficiency of individual queries scanning too much data.",
                3: "Incorrect. Redshift Spectrum also benefits from Parquet and partitioning; switching services without fixing the data format won't solve the root problem."
            }
        },
        {
            domain: "Data Security & Governance",
            type: "single",
            question: "A company needs to audit who accessed specific data in their S3 data lake and when. Which AWS service provides this detailed API-level logging?",
            options: [
                "A. AWS CloudTrail.",
                "B. Amazon CloudWatch Logs.",
                "C. VPC Flow Logs.",
                "D. AWS Trusted Advisor."
            ],
            correctAnswers: [0],
            explanations: {
                0: "Correct. AWS CloudTrail records API calls made to AWS services, including S3 Data Events (GetObject, PutObject, etc.), which allows for auditing data access.",
                1: "Incorrect. CloudWatch Logs store application logs and metrics, but they don't automatically capture S3 API access logs unless configured via CloudTrail or S3 Access Logging.",
                2: "Incorrect. VPC Flow Logs capture network traffic information (IPs, ports) but not high-level service API actions or object-level access details.",
                3: "Incorrect. Trusted Advisor provides recommendations on cost, security, and performance; it does not provide access logs."
            }
        },
        {
            domain: "Data Operations & Orchestration",
            type: "multiple",
            question: "A data engineer needs to monitor an AWS Glue job and receive an alert if the job fails. Which TWO services would be part of a serverless solution for this? (Choose TWO)",
            options: [
                "A. Amazon CloudWatch Events (EventBridge).",
                "B. Amazon SNS.",
                "C. Amazon SQS.",
                "D. AWS Shield.",

                0: "Incorrect. Encryption is separate from partition management.",
                1: "Correct. For highly partitioned data, retrieving partition info from the catalog can be slow. Projection speeds this up by calculating the partition values and S3 paths based on rules.",
                2: "Incorrect. It is a metadata optimization, not a physical data movement tool.",
                3: "Incorrect. This is a humorous distractor."
            }
        },
        {
            domain: "Data Storage & Management",
            type: "single",
            question: "A data engineer wants to run a large-scale Spark cluster for a few hours to perform complex data processing. They want to minimize costs and don't mind if the cluster is interrupted. Which EMR feature should they use?",
            options: [
                "A. On-Demand Instances.",
                "B. Reserved Instances.",
                "C. Spot Instances.",
                "D. Dedicated Hosts."
            ],
            correctAnswers: [2],
            explanations: {
                0: "Incorrect. On-Demand is more expensive and used for jobs that cannot be interrupted.",
                1: "Incorrect. Reserved Instances require a 1-3 year commitment, not suitable for a 'few hours'.",
                2: "Correct. Spot Instances offer up to 90% discount compared to On-Demand, which is perfect for EMR workloads that can handle node interruptions.",
                3: "Incorrect. Dedicated hosts are for compliance/licensing and are the most expensive option."
            }
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let userSelections = [];
    let submitted = false;

    function initExam() {
        renderQuestion();
        updateUI();
    }

    function renderQuestion() {
        const q = questions[currentQuestionIndex];
        const container = document.getElementById('question-container');
        container.innerHTML = '';

        const qBox = document.createElement('div');
        qBox.className = 'question-box active';

        const domainTag = document.createElement('div');
        domainTag.className = 'domain-tag';
        domainTag.innerText = q.domain;
        qBox.appendChild(domainTag);

        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.innerText = q.question;
        qBox.appendChild(qText);

        const optionsList = document.createElement('ul');
        optionsList.className = 'options-list';

        q.options.forEach((opt, idx) => {
            const li = document.createElement('li');
            li.className = 'option-item';
            
            const input = document.createElement('input');
            input.type = q.type === 'multiple' ? 'checkbox' : 'radio';
            input.name = 'q-opt';
            input.value = idx;
            input.id = `opt-${idx}`;
            
            const label = document.createElement('label');
            label.htmlFor = `opt-${idx}`;
            label.innerText = opt;

            li.appendChild(input);
            li.appendChild(label);
            li.onclick = () => {
                if (!submitted) {
                    if (q.type === 'multiple') {
                        input.checked = !input.checked;
                    } else {
                        input.checked = true;
                    }
                }
            };
            optionsList.appendChild(li);
        });

        qBox.appendChild(optionsList);

        const feedbackArea = document.createElement('div');
        feedbackArea.id = 'feedback-area';
        feedbackArea.className = 'feedback-area';
        qBox.appendChild(feedbackArea);

        container.appendChild(qBox);
    }

    function updateUI() {
        document.getElementById('current-q-num').innerText = currentQuestionIndex + 1;
        const progress = ((currentQuestionIndex) / questions.length) * 100;
        document.getElementById('progress-fill').style.width = `${progress}%`;
        
        document.getElementById('btn-prev').disabled = currentQuestionIndex === 0;
        document.getElementById('btn-submit').style.display = submitted ? 'none' : 'inline-block';
        document.getElementById('btn-next').style.display = submitted ? 'inline-block' : 'none';
        
        if (currentQuestionIndex === questions.length - 1 && submitted) {
            document.getElementById('btn-next').innerText = "Finish Exam";
        } else {
            document.getElementById('btn-next').innerText = "Next Question";
        }
    }

    function submitAnswer() {
        const q = questions[currentQuestionIndex];
        const selectedInputs = document.querySelectorAll('input[name="q-opt"]:checked');
        const selectedIndices = Array.from(selectedInputs).map(i => parseInt(i.value));

        if (selectedIndices.length === 0) {
            alert("Please select an answer.");
            return;
        }

        submitted = true;
        const feedbackArea = document.getElementById('feedback-area');
        feedbackArea.style.display = 'block';

        const isCorrect = checkCorrectness(selectedIndices, q.correctAnswers);
        if (isCorrect) {
            score++;
            feedbackArea.className = 'feedback-area feedback-correct';
            feedbackArea.innerHTML = '<strong>✅ Correct!</strong>';
        } else {
            feedbackArea.className = 'feedback-area feedback-incorrect';
            feedbackArea.innerHTML = '<strong>❌ Incorrect.</strong>';
        }

        // Add Explanations
        let explHTML = '<div style="margin-top:15px"><strong>Explanations:</strong></div>';
        q.options.forEach((opt, idx) => {
            const isRightOpt = q.correctAnswers.includes(idx);
            explHTML += `<div class="explanation-item">
                <b>${opt.split('.')[0]}: ${isRightOpt ? '✅' : '❌'}</b>
                ${q.explanations[idx]}
            </div>`;
        });
        feedbackArea.innerHTML += explHTML;

        // Disable inputs
        document.querySelectorAll('input[name="q-opt"]').forEach(i => i.disabled = true);
        updateUI();
    }

    function checkCorrectness(selected, correct) {
        if (selected.length !== correct.length) return false;
        return selected.every(val => correct.includes(val));
    }

    function moveNext() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            submitted = false;
            renderQuestion();
            updateUI();
        } else {
            showFinalResults();
        }
    }

    function movePrevious() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            submitted = true; // Stay in submitted state to show logic (simulated for this practice app)
            renderQuestion();
            // Re-render logic would normally store user state; here we just reset for simplicity
            submitted = false; 
            updateUI();
        }
    }

    function showFinalResults() {
        document.getElementById('exam-ui').style.display = 'none';
        const resultScreen = document.getElementById('result-screen');
        resultScreen.style.display = 'block';

        const percent = Math.round((score / questions.length) * 100);
        const scoreCircle = document.getElementById('final-score-circle');
        scoreCircle.innerText = `${percent}%`;

        const msgDiv = document.getElementById('pass-fail-msg');
        if (percent >= 72) {
            msgDiv.innerHTML = '<span class="pass-msg">PASS</span>';
            scoreCircle.style.borderColor = 'var(--correct-color)';
        } else {
            msgDiv.innerHTML = '<span class="fail-msg">FAIL</span>';
            scoreCircle.style.borderColor = 'var(--incorrect-color)';
        }

        document.getElementById('correct-count').innerText = score;
    }

    // Start
    initExam();
</script>

</body>
</html>
