<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Certified Data Engineer - Associate Practice Exam</title>
    <style>
        :root {
            --aws-blue: #232f3e;
            --aws-orange: #ff9900;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --correct-color: #2e7d32;
            --incorrect-color: #d32f2f;
            --explanation-bg: #e3f2fd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header {
            border-bottom: 3px solid var(--aws-orange);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        h1 { color: var(--aws-blue); margin: 0; font-size: 24px; }
        .exam-info { font-size: 14px; color: #666; margin-top: 5px; }

        .progress-bar {
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--aws-orange);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-box {
            display: none;
        }

        .question-box.active {
            display: block;
        }

        .question-text {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .options-list {
            list-style: none;
            padding: 0;
        }

        .option-item {
            margin-bottom: 12px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: flex-start;
        }

        .option-item:hover {
            background-color: #f9f9f9;
        }

        .option-item input {
            margin-right: 15px;
            margin-top: 5px;
        }

        .btn-container {
            margin-top: 25px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-submit { background-color: var(--aws-orange); color: white; }
        .btn-next { background-color: var(--aws-blue); color: white; }
        .btn-prev { background-color: #666; color: white; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .feedback-area {
            margin-top: 25px;
            padding: 20px;
            border-radius: 6px;
            display: none;
        }

        .feedback-correct { border-left: 5px solid var(--correct-color); background: #e8f5e9; }
        .feedback-incorrect { border-left: 5px solid var(--incorrect-color); background: #ffebee; }

        .explanation-item {
            margin-top: 15px;
            font-size: 14px;
        }

        .explanation-item b { display: block; margin-bottom: 4px; }

        .result-screen {
            text-align: center;
            display: none;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 10px solid var(--aws-orange);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            margin: 30px auto;
        }

        .pass-msg { color: var(--correct-color); font-size: 24px; font-weight: bold; }
        .fail-msg { color: var(--incorrect-color); font-size: 24px; font-weight: bold; }

        .domain-tag {
            display: inline-block;
            background: #eee;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
            color: #555;
        }

        .start-screen {
            text-align: center;
            margin-top: 30px;
        }

        .start-screen p { margin-bottom: 20px; }

        .note { color: #555; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>AWS Certified Data Engineer - Associate</h1>
        <div class="exam-info">150-question pool | Choose 20 or 50 questions | Passing Score: 72%</div>
    </header>

    <div id="start-screen" class="start-screen">
        <p>Select your exam length and begin. Questions are randomized each time from the repository.</p>
        <div class="btn-container">
            <button class="btn-submit" onclick="startExam(20)">Start 20 Questions</button>
            <button class="btn-submit" onclick="startExam(50)">Start 50 Questions</button>
        </div>
    </div>

    <div id="exam-ui" style="display:none">
        <div class="progress-info">Question <span id="current-q-num">1</span> of <span id="total-q-num">0</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

        <div id="question-container"></div>

        <div class="btn-container">
            <button id="btn-prev" class="btn-prev" onclick="movePrevious()" disabled>Previous</button>
            <button id="btn-submit" class="btn-submit" onclick="submitAnswer()">Submit Answer</button>
            <button id="btn-next" class="btn-next" onclick="moveNext()" style="display:none">Next Question</button>
        </div>
    </div>

    <div id="result-screen" class="result-screen">
        <h2>Exam Complete</h2>
        <div class="score-circle" id="final-score-circle">0%</div>
        <div id="pass-fail-msg"></div>
        <p>Your Score: <span id="correct-count">0</span> / <span id="total-count">0</span></p>
        <button class="btn-submit" onclick="location.reload()">Retake Exam</button>
    </div>
</div>

<script>
const allQuestions = [{"domain": "DATA INGESTION & TRANSFORMATION", "question": "A company needs to ingest data from an on-premises Oracle database into an Amazon S3 data lake. The data must be updated every hour, and the company wants to ensure that only changed records are moved to minimize bandwidth usage. Which solution is most efficient?", "options": ["Use an AWS Glue crawler to scan the Oracle database and update the Data Catalog.", "Set up an AWS DMS replication task with Change Data Capture (CDC) enabled.", "Use Amazon AppFlow to schedule a full refresh of the data every hour.", "Export the data to CSV files on-premises and use the AWS CLI to sync with S3."], "explanations": {"A": "Crawlers extract metadata only, not data. They are used to populate the Glue Data Catalog but do not perform the ingestion or move transactional records.", "B": "AWS DMS with CDC is the best practice for this scenario. It reads the source database transaction logs to capture changes in real-time or near real-time, minimizing impact on the source and reducing bandwidth.", "C": "AppFlow is primarily for SaaS applications. While it has some database connectors, a full refresh every hour is inefficient compared to a CDC-based approach for large datasets.", "D": "Manual exports and CLI syncs lack automation, error handling, and the ability to efficiently track incremental changes without complex custom scripting."}, "correctAnswers": [1], "type": "single"}, {"domain": "DATA INGESTION & TRANSFORMATION", "question": "A data engineer is building a streaming pipeline for website clickstream data. The data needs to be processed by a Lambda function for real-time fraud detection and also stored in Amazon S3 for long-term analytics in Parquet format. Which TWO services should be combined to achieve this? (Choose TWO)", "options": ["Amazon Kinesis Data Streams", "Amazon Kinesis Data Firehose", "Amazon Managed Streaming for Apache Kafka (MSK)", "Amazon SQS"], "explanations": {"A": "Kinesis Data Streams is ideal for real-time processing. It can act as the source for Lambda, allowing for immediate fraud detection analysis on the stream as it arrives.", "B": "Kinesis Data Firehose is the best choice for delivery. It can consume the same stream and handle the buffering, Parquet conversion, and delivery to S3 with zero management overhead.", "C": "MSK is a powerful Kafka service but requires more operational overhead for cluster management and scaling than the Kinesis serverless options.", "D": "SQS is a message queue for decoupling systems. It does not support streaming delivery to S3 with Parquet conversion natively like Firehose does.", "E": "SNS is a pub/sub notification service. It is not designed for high-throughput data streaming or large-scale data storage delivery."}, "correctAnswers": [0, 1], "type": "multiple"}, {"domain": "DATA STORAGE & MANAGEMENT", "question": "An analytics team is querying a 50 TB dataset in Amazon S3 using Amazon Athena. The data is currently in CSV format. A data engineer wants to reduce query costs and improve performance. Which optimization should be performed first?", "options": ["Convert the data to Apache Parquet format and implement partitioning.", "Move the data from S3 Standard to S3 Intelligent-Tiering.", "Create an S3 Access Point for the analytics team.", "Increase the memory limit for the Athena workgroup."], "explanations": {"A": "Parquet is a columnar format that allows Athena to read only the specific columns needed for a query. Partitioning allows it to skip irrelevant files. Combined, they drastically reduce the amount of data scanned, lowering cost and time.", "B": "S3 Intelligent-Tiering optimizes storage costs for data access patterns but does not change the physical data format or how much data Athena must scan per query.", "C": "Access Points simplify data access management for large shared buckets but have no impact on the performance or cost of SQL queries within Athena.", "D": "Athena is a serverless service; you cannot manually 'increase memory' for a workgroup. Performance is optimized through data structure and query tuning."}, "correctAnswers": [0], "type": "single"}, {"domain": "DATA STORAGE & MANAGEMENT", "question": "A company is using Amazon Redshift for its data warehouse. They have a 'Sales' table with 10 billion rows that is frequently joined with a 'Products' table on 'product_id'. The 'Products' table has 5,000 rows. What is the most effective distribution style for the 'Products' table?", "options": ["DISTSTYLE KEY using 'product_id'", "DISTSTYLE ALL", "DISTSTYLE EVEN", "DISTSTYLE AUTO"], "explanations": {"A": "Key distribution is useful for joining two large tables. For a very small table (5,000 rows), it is less efficient than copying the data to every node.", "B": "ALL distribution replicates the entire table to every compute node. This ensures that joins with the massive Sales table happen locally on every node, eliminating network shuffle and maximizing speed.", "C": "Even distribution spreads rows across nodes. During a join, this would require moving the Product data over the network to match the Sales data on specific nodes, causing a bottleneck.", "D": "While AUTO might eventually pick ALL, explicitly setting it ensures optimal performance from day one for small, frequently joined dimension tables."}, "correctAnswers": [1], "type": "single"}, {"domain": "DATA OPERATIONS & ORCHESTRATION", "question": "A data engineer needs to orchestrate a data pipeline that runs an AWS Glue job, then triggers a Lambda function if the Glue job succeeds. If either fails, an SNS notification must be sent. Which service is best suited for this?", "options": ["AWS Step Functions", "Amazon EventBridge", "AWS Lambda Destinations", "Amazon CloudWatch Alarms"], "explanations": {"A": "Step Functions is a serverless orchestrator that allows you to build complex state machines with branching logic, error handling, and retries, making it the perfect choice for this multi-step workflow.", "B": "EventBridge can trigger actions based on events, but managing the state and the specific sequence (Wait for Glue -> Success -> Lambda) is more complex than using a state machine.", "C": "Lambda Destinations work for asynchronous Lambda calls but cannot easily manage the upstream Glue job status or the entire end-to-end workflow logic.", "D": "CloudWatch Alarms can notify on failure but are not an orchestration tool for sequencing jobs and passing data between them."}, "correctAnswers": [0], "type": "single"}, {"domain": "DATA SECURITY & GOVERNANCE", "question": "A data engineer needs to ensure that users in the 'Marketing' IAM group can only see the 'Email' and 'Phone' columns in an Athena table if the 'Region' column matches 'Europe'. Which service provides this fine-grained access control?", "options": ["IAM Policy Condition keys", "Amazon S3 Bucket Policies", "AWS Lake Formation", "Amazon Macie"], "explanations": {"A": "IAM policies can control access to the whole bucket or prefix, but they cannot perform row- level (Region='Europe') or column-level filtering on data stored in S3.", "B": "Bucket policies define which principals can access objects, but they have no capability to parse the interior data of those objects to apply row/column logic.", "C": "AWS Lake Formation provides a centralized security layer for data lakes. It allows you to define column-level and row-level permissions that are enforced across Athena and Glue.", "D": "Amazon Macie is a data discovery service that finds sensitive data like PII in S3 using ML. It does not enforce access control policies for end-user queries."}, "correctAnswers": [2], "type": "single"}, {"domain": "DATA OPERATIONS & ORCHESTRATION", "question": "A data engineer is working on a solution involving Transfer Family for SFTP ingestion into S3. The requirement is to maximize cost-efficiency while maintaining high availability. Which configuration should be used?", "options": ["Standard configuratio let examQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let userSelections = [];
let submitted = false;

function shuffle(array) {
    const copy = array.slice();
    for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
}

function startExam(length) {
    examQuestions = shuffle(allQuestions).slice(0, length);
    currentQuestionIndex = 0;
    score = 0;
    submitted = false;
    userSelections = Array(length).fill(null);

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('exam-ui').style.display = 'block';
    document.getElementById('total-q-num').innerText = length;
    renderQuestion();
    updateUI();
}

function renderQuestion() {
    const q = examQuestions[currentQuestionIndex];
    const container = document.getElementById('question-container');
    container.innerHTML = '';

    const qBox = document.createElement('div');
    qBox.className = 'question-box active';

    const domainTag = document.createElement('div');
    domainTag.className = 'domain-tag';
    domainTag.innerText = q.domain;
    qBox.appendChild(domainTag);

    const qText = document.createElement('div');
    qText.className = 'question-text';
    qText.innerText = q.question;
    qBox.appendChild(qText);

    const optionsList = document.createElement('ul');
    optionsList.className = 'options-list';

    const inputType = q.type === 'multiple' ? 'checkbox' : 'radio';
    q.options.forEach((opt, idx) => {
        const li = document.createElement('li');
        li.className = 'option-item';

        const input = document.createElement('input');
        input.type = inputType;
        input.name = 'q-opt';
        input.value = idx;
        input.id = `opt-${idx}`;

        const label = document.createElement('label');
        label.htmlFor = `opt-${idx}`;
        label.innerText = opt;
        label.style.cursor = 'pointer';

        li.appendChild(input);
        li.appendChild(label);
        optionsList.appendChild(li);

        li.addEventListener('click', (event) => {
            if (event.target.tagName !== 'INPUT') {
                input.checked = !input.checked;
            }
        });
    });

    qBox.appendChild(optionsList);

    const feedbackArea = document.createElement('div');
    feedbackArea.id = 'feedback-area';
    feedbackArea.className = 'feedback-area';
    qBox.appendChild(feedbackArea);

    container.appendChild(qBox);

    const saved = userSelections[currentQuestionIndex];
    if (saved) {
        document.querySelectorAll('input[name="q-opt"]').forEach((input) => {
            input.checked = saved.selected.includes(parseInt(input.value, 10));
            input.disabled = true;
        });
        submitted = true;
        showFeedback(saved.isCorrect, q, feedbackArea);
    } else {
        submitted = false;
        feedbackArea.style.display = 'none';
        document.querySelectorAll('input[name="q-opt"]').forEach((input) => {
            input.disabled = false;
        });
    }
}

function updateUI() {
    document.getElementById('current-q-num').innerText = currentQuestionIndex + 1;
    const progress = ((currentQuestionIndex) / examQuestions.length) * 100;
    document.getElementById('progress-fill').style.width = `${progress}%`;

    document.getElementById('btn-prev').disabled = currentQuestionIndex === 0;
    document.getElementById('btn-submit').style.display = submitted ? 'none' : 'inline-block';
    document.getElementById('btn-next').style.display = submitted ? 'inline-block' : 'none';

    if (currentQuestionIndex === examQuestions.length - 1 && submitted) {
        document.getElementById('btn-next').innerText = 'Finish Exam';
    } else {
        document.getElementById('btn-next').innerText = 'Next Question';
    }
}

function submitAnswer() {
    const q = examQuestions[currentQuestionIndex];
    const selectedInputs = document.querySelectorAll('input[name="q-opt"]:checked');
    const selectedIndices = Array.from(selectedInputs).map(i => parseInt(i.value, 10));

    if (selectedIndices.length === 0) {
        alert('Please select at least one answer before submitting.');
        return;
    }

    const isCorrect = checkCorrectness(selectedIndices, q.correctAnswers);
    if (isCorrect) {
        score += 1;
    }

    userSelections[currentQuestionIndex] = {
        selected: selectedIndices,
        isCorrect: isCorrect
    };

    submitted = true;
    const feedbackArea = document.getElementById('feedback-area');
    feedbackArea.style.display = 'block';
    showFeedback(isCorrect, q, feedbackArea);

    document.querySelectorAll('input[name="q-opt"]').forEach(i => i.disabled = true);
    updateUI();
}

function showFeedback(isCorrect, q, feedbackArea) {
    feedbackArea.className = 'feedback-area ' + (isCorrect ? 'feedback-correct' : 'feedback-incorrect');
    feedbackArea.innerHTML = `<strong>${isCorrect ? '✅ Correct!' : '❌ Incorrect.'}</strong>`;

    let explHTML = '<div style="margin-top:15px"><strong>Explanations:</strong></div>';
    q.options.forEach((opt, idx) => {
        const label = String.fromCharCode(65 + idx);
        const expl = q.explanations[label] || 'No explanation available.';
        explHTML += `<div class="explanation-item"><b>${label}.</b>${expl}</div>`;
    });
    feedbackArea.innerHTML += explHTML;
}

function checkCorrectness(selected, correct) {
    if (selected.length !== correct.length) return false;
    const sortedSelected = [...selected].sort((a,b) => a - b);
    const sortedCorrect = [...correct].sort((a,b) => a - b);
    return sortedSelected.every((value, index) => value === sortedCorrect[index]);
}

function moveNext() {
    if (currentQuestionIndex < examQuestions.length - 1) {
        currentQuestionIndex += 1;
        renderQuestion();
        updateUI();
    } else {
        showFinalResults();
    }
}

function movePrevious() {
    if (currentQuestionIndex > 0) {
        currentQuestionIndex -= 1;
        renderQuestion();
        updateUI();
    }
}

function showFinalResults() {
    document.getElementById('exam-ui').style.display = 'none';
    const resultScreen = document.getElementById('result-screen');
    resultScreen.style.display = 'block';

    const percent = Math.round((score / examQuestions.length) * 100);
    const scoreCircle = document.getElementById('final-score-circle');
    scoreCircle.innerText = `${percent}%`;

    const msgDiv = document.getElementById('pass-fail-msg');
    if (percent >= 72) {
        msgDiv.innerHTML = '<div class="pass-msg">Pass</div>';
        scoreCircle.style.borderColor = 'var(--correct-color)';
    } else {
        msgDiv.innerHTML = '<div class="fail-msg">Fail</div>';
        scoreCircle.style.borderColor = 'var(--incorrect-color)';
    }

    document.getElementById('correct-count').innerText = score;
    document.getElementById('total-count').innerText = examQuestions.length;
}
