<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Data Engineering Practice Exam</title>
    <style>
        :root {
            --aws-navy: #232F3E;
            --aws-orange: #FF9900;
            --aws-light-blue: #00A1C9;
            --bg-color: #f2f4f8;
            --card-bg: #ffffff;
            --text-main: #16191f;
            --text-muted: #545b64;
            --correct-green: #1d8102;
            --incorrect-red: #d13212;
            --border-radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Amazon Ember', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; padding: 20px; }
        
        .container { max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 30px; border-radius: var(--border-radius); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--aws-orange); padding-bottom: 20px; }
        header h1 { color: var(--aws-navy); }
        
        /* Screens */
        .screen { display: none; }
        .screen.active { display: block; }
        
        /* Buttons */
        .btn { display: inline-block; padding: 12px 24px; font-size: 16px; font-weight: bold; color: #fff; background-color: var(--aws-orange); border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s; text-align: center; }
        .btn:hover { background-color: #e88b00; }
        .btn-outline { background-color: transparent; border: 2px solid var(--aws-navy); color: var(--aws-navy); }
        .btn-outline:hover { background-color: var(--aws-navy); color: #fff; }
        
        /* Setup Screen */
        .setup-options { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        
        /* Quiz Screen */
        .progress-bar { display: flex; justify-content: space-between; font-size: 14px; color: var(--text-muted); margin-bottom: 20px; font-weight: bold; }
        .difficulty-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; color: #fff; }
        .diff-Easy { background-color: #1d8102; }
        .diff-Medium { background-color: #e07700; }
        .diff-Hard { background-color: #d13212; }
        
        .question-text { font-size: 18px; margin-bottom: 25px; font-weight: 600; }
        
        .options-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .option-btn { text-align: left; padding: 15px; font-size: 16px; border: 1px solid #d5dbdb; border-radius: var(--border-radius); background: #fff; cursor: pointer; transition: all 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: var(--aws-light-blue); background-color: #f2f8fd; }
        .option-btn:disabled { cursor: not-allowed; }
        
        /* Feedback States */
        .option-btn.correct { background-color: #e7f4e4; border-color: var(--correct-green); color: var(--correct-green); font-weight: bold; }
        .option-btn.incorrect { background-color: #fae3e1; border-color: var(--incorrect-red); color: var(--incorrect-red); }
        .option-btn.dimmed { opacity: 0.6; }

        .feedback-container { background: #f8f9fa; padding: 20px; border-radius: var(--border-radius); border-left: 4px solid var(--aws-navy); margin-bottom: 20px; display: none; }
        .feedback-container h3 { margin-bottom: 15px; }
        .feedback-result-text { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .text-correct { color: var(--correct-green); }
        .text-incorrect { color: var(--incorrect-red); }
        .explanation-item { margin-bottom: 10px; font-size: 14.5px; }

        .next-btn-container { text-align: right; }

        /* Results Screen */
        .results-summary { text-align: center; margin-bottom: 30px; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; border: 8px solid var(--aws-orange); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; margin: 0 auto 20px auto; color: var(--aws-navy); }
        .stats-grid { display: flex; justify-content: space-around; margin-bottom: 30px; }
        .stat-box { text-align: center; padding: 15px; background: #f2f4f8; border-radius: var(--border-radius); width: 45%; }
        .stat-box h4 { color: var(--text-muted); font-size: 14px; }
        .stat-box p { font-size: 24px; font-weight: bold; margin-top: 5px; }

        @media (max-width: 600px) {
            .setup-options { flex-direction: column; }
            .stats-grid { flex-direction: column; gap: 15px; }
            .stat-box { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AWS Data Engineering Exam</h1>
        <p>Practice Mode</p>
    </header>

    <!-- Setup Screen -->
    <div id="setup-screen" class="screen active">
        <h2 style="text-align: center; margin-bottom: 15px;">Configure Your Exam</h2>
        <p style="text-align: center; color: var(--text-muted);">Select the number of questions to begin. Questions and options will be randomized.</p>
        <div class="setup-options">
            <button class="btn btn-outline" onclick="startExam(20)">Start 20-Question Exam</button>
            <button class="btn" onclick="startExam(50)">Start 50-Question Exam</button>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">
        <div class="progress-bar">
            <span id="question-counter">Question 1 / 20</span>
            <span id="difficulty-indicator" class="difficulty-badge diff-Medium">Medium</span>
        </div>
        
        <div id="question-text" class="question-text">Loading question...</div>
        
        <div id="options-container" class="options-container">
            <!-- Options injected here -->
        </div>

        <div id="feedback-container" class="feedback-container">
            <div id="feedback-result" class="feedback-result-text"></div>
            <h3>Detailed Explanations:</h3>
            <div id="explanations-list"></div>
        </div>

        <div class="next-btn-container">
            <button id="next-btn" class="btn" style="display: none;" onclick="nextQuestion()">Next Question &rarr;</button>
        </div>
    </div>

    <!-- Results Screen -->
    <div id="results-screen" class="screen">
        <div class="results-summary">
            <h2>Exam Completed</h2>
            <div style="margin-top: 20px;">
                <div class="score-circle" id="final-percentage">0%</div>
            </div>
            <div class="stats-grid">
                <div class="stat-box">
                    <h4>Correct Answers</h4>
                    <p id="final-correct" style="color: var(--correct-green);">0</p>
                </div>
                <div class="stat-box">
                    <h4>Incorrect Answers</h4>
                    <p id="final-incorrect" style="color: var(--incorrect-red);">0</p>
                </div>
            </div>
            <button class="btn" onclick="location.reload()">Return to Main Menu</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // EXAM DATA (JSON Format)
    // Add additional questions to this array following the exact same structure.
    // ==========================================
    const examData = [
        {
            "id": 1,
            "difficulty": "Medium",
            "question": "A data engineering team is designing a data lake on Amazon S3. They have a massive dataset of historical transaction logs. The data is accessed frequently for the first 30 days for real-time dashboards, occasionally accessed between 30 and 90 days for monthly reports, and rarely accessed after 90 days, though it must be retained indefinitely for compliance. The team wants to optimize storage costs with minimal operational overhead and no retrieval fees. Which S3 storage class strategy should they implement?",
            "options": {
                "A": "Store data in S3 Standard. Use an S3 Lifecycle policy to transition the data to S3 Standard-IA after 30 days, and to S3 Glacier Flexible Retrieval after 90 days.",
                "B": "Store the data directly in S3 Intelligent-Tiering and configure it to move data to the Archive Access tier after 90 days.",
                "C": "Store data in S3 Standard. Use an S3 Lifecycle policy to transition the data to S3 One Zone-IA after 30 days, and to S3 Glacier Deep Archive after 90 days.",
                "D": "Store the data in S3 Standard. Run an AWS Glue job weekly to identify unused objects and move them to S3 Glacier Instant Retrieval."
            },
            "correctAnswer": "B",
            "explanation": {
                "A": "Incorrect. While S3 Lifecycle policies work well for known patterns, S3 Standard-IA and S3 Glacier Flexible Retrieval both incur data retrieval fees. The requirement explicitly states 'no retrieval fees'.",
                "B": "Correct. S3 Intelligent-Tiering automatically moves data between access tiers based on changing access patterns without performance impact or retrieval fees. It has a Frequent Access tier, an Infrequent Access tier (after 30 days of no access), and can be configured to use the Archive Access tier (after 90 days).",
                "C": "Incorrect. S3 One Zone-IA does not provide the same durability as Standard/Intelligent-tiering, and Glacier Deep Archive incurs retrieval fees and long retrieval times not suited if occasional quick access is needed.",
                "D": "Incorrect. Running a custom Glue job for storage tiering introduces high operational overhead and is completely unnecessary given native S3 features."
            }
        },
        {
            "id": 2,
            "difficulty": "Hard",
            "question": "A company is using Amazon Kinesis Data Streams to ingest clickstream data from a global web application. Downstream, an AWS Lambda function processes the stream. During a viral marketing campaign, traffic spikes dramatically, and the Lambda function begins falling behind, indicated by a high `IteratorAgeMilliseconds` metric. Which combination of actions should the Data Engineer take to resolve the processing lag? (Select the most optimal strategy represented as a single flow)",
            "options": {
                "A": "Increase the Kinesis data stream retention period to 7 days and increase the Lambda function's memory allocation.",
                "B": "Use the UpdateShardCount API to increase the number of shards in the Kinesis stream, and increase the ParallelizationFactor for the Lambda event source mapping.",
                "C": "Migrate the data ingestion from Kinesis Data Streams to Amazon Kinesis Data Firehose, routing directly to the Lambda function.",
                "D": "Configure AWS Application Auto Scaling to automatically add more Kinesis streams when CPU utilization on the Lambda function exceeds 80%."
            },
            "correctAnswer": "B",
            "explanation": {
                "A": "Incorrect. Increasing retention period prevents data loss but does not speed up processing or reduce IteratorAge. Increasing memory might speed up execution slightly but doesn't solve concurrent throughput bottlenecking.",
                "B": "Correct. Increasing the number of shards increases the base throughput of the stream. Increasing the ParallelizationFactor (up to 10) allows Lambda to process multiple batches from a single shard concurrently, effectively multiplying processing throughput and directly reducing IteratorAge.",
                "C": "Incorrect. Kinesis Data Firehose is designed for delivering data to destinations (like S3, Redshift), not for real-time custom Lambda processing loops where order and specific parallelization are required.",
                "D": "Incorrect. You scale shards within a stream, not the number of streams. Furthermore, Lambda CPU utilization is not a valid trigger for scaling Kinesis."
            }
        },
        {
            "id": 3,
            "difficulty": "Easy",
            "question": "A data engineer is building a serverless ETL pipeline. Data lands in an Amazon S3 bucket, which triggers an AWS Lambda function. The Lambda function performs light transformations and writes the resulting data to an Amazon DynamoDB table. Which AWS service is responsible for providing the Lambda function with the necessary permissions to read from S3 and write to DynamoDB?",
            "options": {
                "A": "AWS Key Management Service (KMS)",
                "B": "Amazon API Gateway",
                "C": "AWS Identity and Access Management (IAM) Execution Role",
                "D": "AWS Lake Formation"
            },
            "correctAnswer": "C",
            "explanation": {
                "A": "Incorrect. AWS KMS is used for encryption and key management, not for granting service-to-service execution permissions.",
                "B": "Incorrect. API Gateway is used to create and manage REST/WebSocket APIs, it does not manage internal IAM service roles.",
                "C": "Correct. An IAM Execution Role is attached to the Lambda function. The role must contain policies that explicitly grant 's3:GetObject' permissions for the source bucket and 'dynamodb:PutItem' permissions for the destination table.",
                "D": "Incorrect. Lake Formation is used for column/row-level permissions and governance over data lakes (S3/Athena/Glue), not for standard DynamoDB access."
            }
        },
        {
            "id": 4,
            "difficulty": "Medium",
            "question": "An analytics team uses Amazon Redshift to query massive fact tables joined with several smaller dimension tables. Currently, queries are running slowly. Upon investigating, the Data Engineer notices significant network broadcast traffic occurring during query execution (broadcast motion). How can the engineer optimize the table design to reduce broadcast traffic and speed up the queries?",
            "options": {
                "A": "Change the distribution style of the large fact tables to DISTSTYLE ALL.",
                "B": "Change the distribution style of the small dimension tables to DISTSTYLE ALL.",
                "C": "Define a SORTKEY on the small dimension tables matching the primary key.",
                "D": "Enable Concurrency Scaling on the Redshift cluster."
            },
            "correctAnswer": "B",
            "explanation": {
                "A": "Incorrect. Setting DISTSTYLE ALL on a massive fact table would copy the entire massive table to every compute node, rapidly exhausting cluster storage and severely degrading write performance.",
                "B": "Correct. DISTSTYLE ALL places a complete copy of the dimension table on the first slice of every compute node. When joining a fact table to a dimension table with DISTSTYLE ALL, the join occurs locally on the node without needing to broadcast data across the network, resolving the broadcast motion issue.",
                "C": "Incorrect. While a SORTKEY helps with filtering and range queries, it does not resolve network broadcast traffic during a join. Distribution styles manage data placement across nodes.",
                "D": "Incorrect. Concurrency Scaling helps manage multiple concurrent users sending queries at the same time; it does not optimize a poorly designed query or table schema generating broadcast traffic."
            }
        },
        {
            "id": 5,
            "difficulty": "Medium",
            "question": "A company requires near real-time replication of database changes from an on-premises PostgreSQL database to an Amazon S3 data lake. The replicated data must capture inserts, updates, and deletes so that downstream ETL jobs can process an accurate state of the tables. Which AWS service combination is best suited for this requirement?",
            "options": {
                "A": "AWS Glue Crawler and AWS Glue Jobs",
                "B": "AWS Database Migration Service (DMS) with Change Data Capture (CDC)",
                "C": "Amazon Kinesis Data Streams and AWS Lambda",
                "D": "AWS DataSync"
            },
            "correctAnswer": "B",
            "explanation": {
                "A": "Incorrect. AWS Glue is designed for batch ETL processing. While it can connect to on-prem databases via JDBC, it is not designed to stream real-time transactional changes (inserts/updates/deletes).",
                "B": "Correct. AWS DMS supports Change Data Capture (CDC). It can connect to the on-premises PostgreSQL database, read the write-ahead logs (WAL), and stream ongoing replication changes directly to Amazon S3 in near real-time.",
                "C": "Incorrect. While Kinesis is for real-time data, it requires custom application code on the on-premises database to capture changes and push them to the stream. DMS provides this natively.",
                "D": "Incorrect. AWS DataSync is excellent for moving flat files (like logs or media) over the network to S3 or EFS, but it does not understand database transaction logs or provide CDC capabilities."
            }
        },
        {
            "id": 6,
            "difficulty": "Hard",
            "question": "A financial services company uses Amazon EMR with Apache Spark to process sensitive transaction data. The compliance team requires that all data at rest on the EMR cluster's local storage (HDFS and local file system) must be encrypted using a customer-managed key (CMK) in AWS KMS. Which configuration combination is required to meet this requirement?",
            "options": {
            "A": "Enable S3 Server-Side Encryption (SSE-KMS) and rely on EMR's default encryption for local disks.",
            "B": "Use an EMR Security Configuration to enable 'Local disk encryption' with AWS KMS and 'At-rest encryption' for HDFS.",
            "C": "Apply an IAM policy to the EMR EC2 Instance Profile that denies 'ec2:CreateVolume' unless encryption is enabled.",
            "D": "Manually run a LUKS encryption script on each core and task node during the EMR cluster bootstrap phase."
            },
            "correctAnswer": "B",
            "explanation": {
            "A": "Incorrect. SSE-KMS only covers data stored in S3, not the local HDFS or EBS volumes attached to EMR nodes.",
            "B": "Correct. EMR Security Configurations allow you to define encryption settings for S3, local disks (EBS), and HDFS using AWS KMS keys. This is the native and most manageable way to ensure compliance.",
            "C": "Incorrect. While this might enforce encrypted EBS volumes, it does not configure the application-level encryption required for HDFS or the internal EMR security settings.",
            "D": "Incorrect. Manual scripts are high-overhead and error-prone; EMR Security Configurations automate this process securely."
            }
        },
        {
            "id": 7,
            "difficulty": "Medium",
            "question": "A data engineer is using AWS Glue to perform an ETL job on a large dataset in S3. The job is taking too long to complete because of a 'small files' problem, where the source bucket contains millions of 1 KB files. Which Glue feature or transformation should the engineer use to optimize this process?",
            "options": {
            "A": "Enable 'Job Bookmarks' in the Glue job properties.",
            "B": "Use the 'useS3ListImplementation' setting in the DynamicFrame.",
            "C": "Set the 'groupFiles' parameter to 'inPartition' and 'groupSize' to a larger value in the S3 source connection.",
            "D": "Increase the number of Workers (DPUs) to 100 to handle the parallel processing of small files."
            },
            "correctAnswer": "C",
            "explanation": {
            "A": "Incorrect. Job bookmarks track state for incremental runs; they do not solve the performance issue of reading millions of tiny files.",
            "B": "Incorrect. While this helps with listing large numbers of files, it doesn't solve the overhead of Spark tasks processing tiny files individually.",
            "C": "Correct. The 'groupFiles' feature in Glue allows the reader to merge multiple small files into a single task, significantly reducing the overhead of opening/closing files and task scheduling.",
            "D": "Incorrect. Simply adding DPUs for millions of small files is cost-inefficient and often leads to excessive Spark overhead and metadata bottlenecks."
            }
        },
        {
            "id": 8,
            "difficulty": "Hard",
            "question": "A company wants to build a data lake on S3 and use AWS Lake Formation to manage permissions. They need to ensure that specific analysts can only see rows in a table where the 'Region' column is set to 'North_America'. What is the most efficient way to implement this?",
            "options": {
            "A": "Create separate S3 buckets for each region and use IAM policies to restrict access.",
            "B": "Define a Data Filter in AWS Lake Formation using a Row-level expression and assign it to the analyst's principal.",
            "C": "Create an Athena View with a WHERE clause and grant the analysts permission only to that view.",
            "D": "Use a Glue job to redact rows and save a separate version of the table for each analyst group."
            },
            "correctAnswer": "B",
            "explanation": {
            "A": "Incorrect. This creates data silos and high management overhead, defeating the purpose of a centralized data lake.",
            "B": "Correct. Lake Formation supports row-level and column-level security. Data Filters allow you to define a SQL-like WHERE clause that is automatically applied when the principal queries the table via Athena or Redshift Spectrum.",
            "C": "Incorrect. While possible, this is managed within Athena rather than a centralized governance layer, making it harder to enforce across different tools (like Glue or Redshift).",
            "D": "Incorrect. This results in data duplication and is not dynamic; any updates to the original data would require re-running all redaction jobs."
            }
        },
        {
            "id": 9,
            "difficulty": "Easy",
            "question": "An organization uses Amazon Athena to query data stored in S3. They notice that the costs for Athena are increasing rapidly because users are querying the entire dataset every time. What is the most effective first step to reduce query costs?",
            "options": {
            "A": "Switch the data format from JSON to Apache Parquet.",
            "B": "Migrate the data from S3 Standard to S3 Glacier.",
            "C": "Enable Amazon Redshift Spectrum instead of Athena.",
            "D": "Create more IAM users to distribute the cost across departments."
            },
            "correctAnswer": "A",
            "explanation": {
            "A": "Correct. Athena charges based on the amount of data scanned. Parquet is a columnar format, allowing Athena to only read the specific columns requested in a query, drastically reducing data scanned and cost.",
            "B": "Incorrect. Athena cannot query data stored in S3 Glacier directly; it must be in an active S3 storage class.",
            "C": "Incorrect. Redshift Spectrum also charges based on data scanned and requires a provisioned cluster, which may not be cheaper for occasional queries.",
            "D": "Incorrect. Adding users does not change the amount of data scanned or the overall cost; it just adds administrative overhead."
            }
        },
        {
            "id": 10,
            "difficulty": "Medium",
            "question": "A data pipeline uses AWS Step Functions to orchestrate a series of Lambda functions and Glue jobs. One of the Glue jobs occasionally fails due to an intermittent network issue. How should the Data Engineer configure the Step Function to handle this most reliably?",
            "options": {
            "A": "Use the 'Retry' field in the Step Function state definition with an 'IntervalSeconds' and 'MaxAttempts' parameter.",
            "B": "Write a custom Python script inside the Glue job to catch exceptions and restart the job.",
            "C": "Increase the 'Timeout' of the Lambda function that triggers the Glue job.",
            "D": "Configure an Amazon CloudWatch Alarm to notify an engineer to manually restart the Step Function."
            },
            "correctAnswer": "A",
            "explanation": {
            "A": "Correct. Step Functions have native 'Retry' and 'Catch' logic. Configuring a Retry block for 'Glue.InternalServiceException' or 'Glue.ConcurrentRunsExceededException' allows for automated, resilient error handling without manual intervention.",
            "B": "Incorrect. While possible, it's complex to manage job state and retries within the script itself compared to the orchestrator layer.",
            "C": "Incorrect. Increasing timeout doesn't solve a failure; it just allows the function to wait longer before failing.",
            "D": "Incorrect. This is a manual process and does not contribute to the reliability or automation of the pipeline."
            }
        },
        {
            "id": 11,
            "difficulty": "Medium",
            "question": "A company is ingesting real-time IoT sensor data into Amazon Kinesis Data Streams. They need to transform the data using a Lambda function and then store it in an Amazon S3 bucket for long-term storage and analysis. Which solution provides the simplest, most scalable architecture?",
            "options": {
            "A": "Kinesis Data Streams -> Lambda -> S3.",
            "B": "Kinesis Data Streams -> Kinesis Data Firehose (with Lambda transformation) -> S3.",
            "C": "Kinesis Data Streams -> Amazon MSK -> S3.",
            "D": "Kinesis Data Streams -> Amazon EC2 (running a consumer app) -> S3."
            },
            "correctAnswer": "B",
            "explanation": {
            "A": "Incorrect. While this works, the developer must manage Lambda's batching, retries, and writing to S3. Kinesis Data Firehose automates this.",
            "B": "Correct. Kinesis Data Firehose is a managed service for delivering data to S3. It natively supports data transformation via Lambda and handles scaling, buffering, and delivery without the need for custom consumer code.",
            "C": "Incorrect. Amazon MSK (Managed Streaming for Apache Kafka) adds unnecessary complexity and overhead for this simple delivery use case.",
            "D": "Incorrect. Managing EC2 instances for data ingestion increases operational burden compared to serverless alternatives like Firehose."
            }
        },
        {
            "id": 12,
            "difficulty": "Hard",
            "question": "A Data Engineer is optimizing an Amazon Redshift cluster. A high-priority dashboard query is frequently queued behind long-running batch ETL processes. What should the engineer implement to ensure the dashboard query runs promptly without upgrading the cluster size?",
            "options": {
            "A": "Enable Redshift Concurrency Scaling.",
            "B": "Configure Redshift Workload Management (WLM) with query queues and Query Monitoring Rules (QMR).",
            "C": "Increase the 'max_cursor_result_set_size' parameter.",
            "D": "Use Redshift Spectrum to move the batch data to S3."
            },
            "correctAnswer": "B",
            "explanation": {
            "A": "Incorrect. While Concurrency Scaling adds capacity for bursts, it doesn't prioritize one query over another in the same queue. It also adds cost.",
            "B": "Correct. WLM allows you to create separate queues for different workloads (e.g., 'Reporting' vs. 'ETL'). By assigning the dashboard queries to a dedicated queue with more memory or higher priority, you ensure they aren't blocked by batch jobs.",
            "C": "Incorrect. This parameter affects cursor results, not query scheduling or resource allocation.",
            "D": "Incorrect. Moving data to S3 might help storage, but it doesn't solve the compute resource contention on the cluster."
            }
        },
        {
            "id": 13,
            "difficulty": "Easy",
            "question": "Which AWS service is specifically designed to provide a searchable catalog of all data assets in a data lake, including schemas and partitions?",
            "options": {
            "A": "Amazon S3 Inventory",
            "B": "AWS Glue Data Catalog",
            "C": "Amazon Athena",
            "D": "AWS Secrets Manager"
            },
            "correctAnswer": "B",
            "explanation": {
            "A": "Incorrect. S3 Inventory provides a list of objects and metadata within a bucket, but not the technical schema or partition structure for analytics.",
            "B": "Correct. The Glue Data Catalog is a centralized repository that stores structural and operational metadata for all your data assets, serving as a Hive-compatible metastore.",
            "C": "Incorrect. Athena is a query service that *uses* the Glue Data Catalog, but it is not the catalog itself.",
            "D": "Incorrect. Secrets Manager is for managing database credentials and API keys."
            }
        },
        {
            "id": 14,
            "difficulty": "Medium",
            "question": "A data engineer needs to migrate 50 TB of data from an on-premises Hadoop cluster to Amazon S3. The available internet bandwidth is limited to 50 Mbps, and the migration must be completed within two weeks. Which AWS tool is most appropriate?",
            "options": {
            "A": "AWS Direct Connect",
            "B": "AWS Snowball Edge Storage Optimized",
            "C": "AWS DataSync",
            "D": "Amazon S3 Transfer Acceleration"
            },
            "correctAnswer": "B",
            "explanation": {
            "A": "Incorrect. Setting up Direct Connect takes weeks to months, and a 50 Mbps link would still take over 90 days to transfer 50 TB.",
            "B": "Correct. At 50 Mbps, a 50 TB transfer would take roughly 92 days. A Snowball Edge device can be shipped, loaded with data, and returned within the 2-week window.",
            "C": "Incorrect. DataSync is constrained by the physical network bandwidth (50 Mbps).",
            "D": "Incorrect. Transfer Acceleration optimizes the path over the internet but cannot exceed the physical 50 Mbps speed of the source connection."
            }
        },
        {
            "id": 15,
            "difficulty": "Hard",
            "question": "An application writes small JSON records to an Amazon DynamoDB table. The team wants to trigger an AWS Lambda function to aggregate these records and write them to S3 in 5-minute intervals. What is the most efficient architectural pattern?",
            "options": {
            "A": "Enable DynamoDB Streams and use it as a trigger for a Lambda function that writes directly to S3.",

    // ==========================================
    // APP LOGIC
    // ==========================================
    let currentExamData = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let totalQuestions = 0;

    // Utility: Shuffle Array (Fisher-Yates)
    function shuffleArray(array) {
        let curId = array.length;
        while (0 !== curId) {
            let randId = Math.floor(Math.random() * curId);
            curId -= 1;
            let tmp = array[curId];
            array[curId] = array[randId];
            array[randId] = tmp;
        }
        return array;
    }

    function startExam(num) {
        // Cap the requested number to the available pool size to prevent errors
        totalQuestions = Math.min(num, examData.length);
        
        if(totalQuestions === 0) {
            alert("No questions available in the data pool.");
            return;
        }

        // Reset variables
        score = 0;
        currentQuestionIndex = 0;

        // Shuffle all questions and slice the requested amount
        let shuffledData = shuffleArray([...examData]);
        currentExamData = shuffledData.slice(0, totalQuestions);

        // UI Transitions
        document.getElementById('setup-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');

        loadQuestion();
    }

    function loadQuestion() {
        const qData = currentExamData[currentQuestionIndex];
        
        // Update Header
        document.getElementById('question-counter').innerText = `Question ${currentQuestionIndex + 1} of ${totalQuestions}`;
        
        const diffBadge = document.getElementById('difficulty-indicator');
        diffBadge.innerText = qData.difficulty;
        diffBadge.className = `difficulty-badge diff-${qData.difficulty}`;

        // Set Question Text
        document.getElementById('question-text').innerText = qData.question;

        // Prepare Options (Randomize them)
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = ''; // clear previous
        
        const optionKeys = ['A', 'B', 'C', 'D'];
        let shuffledKeys = shuffleArray([...optionKeys]);

        // Create buttons
        shuffledKeys.forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = qData.options[key];
            btn.onclick = () => selectOption(key, qData.correctAnswer, qData.explanation, shuffledKeys);
            
            // Store the real key in a data attribute
            btn.setAttribute('data-key', key);
            optionsContainer.appendChild(btn);
        });

        // Hide feedback and next button
        document.getElementById('feedback-container').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function selectOption(selectedKey, correctKey, explanations, activeKeys) {
        // Disable all buttons immediately
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        const isCorrect = (selectedKey === correctKey);
        if (isCorrect) score++;

        // Style buttons
        buttons.forEach(btn => {
            const btnKey = btn.getAttribute('data-key');
            if (btnKey === correctKey) {
                btn.classList.add('correct');
            } else if (btnKey === selectedKey && !isCorrect) {
                btn.classList.add('incorrect');
            } else {
                btn.classList.add('dimmed');
            }
        });

        // Show Feedback text
        const feedbackContainer = document.getElementById('feedback-container');
        const feedbackResult = document.getElementById('feedback-result');
        
        if (isCorrect) {
            feedbackResult.innerText = "✓ Correct!";
            feedbackResult.className = "feedback-result-text text-correct";
        } else {
            feedbackResult.innerText = "✗ Incorrect";
            feedbackResult.className = "feedback-result-text text-incorrect";
        }

        // Build Explanation List - show correct answer first, then others
        const explList = document.getElementById('explanations-list');
        explList.innerHTML = '';
        
        // Get all keys and sort so correct answer shows first
        const allKeys = ['A', 'B', 'C', 'D'];
        const orderedKeys = [correctKey, ...allKeys.filter(k => k !== correctKey)];

        orderedKeys.forEach(k => {
            const div = document.createElement('div');
            div.className = 'explanation-item';
            // Remove letter prefix from explanation to avoid confusion when options are shuffled
            const explanationText = explanations[k].replace(/^[A-D]\.\s*/, '');
            div.innerHTML = explanationText;
            explList.appendChild(div);
        });

        feedbackContainer.style.display = 'block';

        // Update Next button text if it's the last question
        const nextBtn = document.getElementById('next-btn');
        if (currentQuestionIndex === totalQuestions - 1) {
            nextBtn.innerText = "View Results";
        } else {
            nextBtn.innerHTML = "Next Question &rarr;";
        }
        nextBtn.style.display = 'inline-block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < totalQuestions) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('results-screen').classList.add('active');

        const percentage = Math.round((score / totalQuestions) * 100);
        
        const circle = document.getElementById('final-percentage');
        circle.innerText = `${percentage}%`;
        
        // Color circle based on pass/fail (assuming 70% is passing)
        if (percentage >= 70) {
            circle.style.borderColor = "var(--correct-green)";
            circle.style.color = "var(--correct-green)";
        } else {
            circle.style.borderColor = "var(--incorrect-red)";
            circle.style.color = "var(--incorrect-red)";
        }

        document.getElementById('final-correct').innerText = score;
        document.getElementById('final-incorrect').innerText = totalQuestions - score;
    }
</script>
